<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Required</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b1120; /* Dark background color */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .modal {
            background-color: #1e293b; /* Darker box color */
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 85%;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            color: #38bdf8; /* Light blue heading */
            font-size: 24px;
            margin-bottom: 15px;
        }

        p {
            color: #94a3b8; /* Light gray text */
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .proceed-btn {
            display: inline-block;
            background-color: #2563eb; /* Primary blue button */
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            width: 100%;
            box-sizing: border-box;
            transition: background-color 0.2s;
        }

        .proceed-btn:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="modal">
        <h1>You're one step away!</h1>
        <p>You are just a few moments away from securely receiving your crypto straight into your local bank account.</p>
        <a href="proceed.html" class="proceed-btn">Proceed</a>
    </div>

</body>
</html>
